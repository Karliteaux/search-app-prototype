<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Columbia University — Search</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="scene">
      <div class="scene__bg" aria-hidden="true"></div>

      <!-- Drifting clouds layer -->
      <div class="clouds" aria-hidden="true">
        <div class="cloud cloud--1"></div>
        <div class="cloud cloud--2"></div>
        <div class="cloud cloud--3"></div>
      </div>

      <!-- Flock of birds animating across the sky -->
      <div class="birds" aria-hidden="true">
        <svg class="bird bird--1" viewBox="0 0 24 10"><path d="M1 7 Q6 1 12 7 Q18 1 23 7" fill="none" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/></svg>
        <svg class="bird bird--2" viewBox="0 0 24 10"><path d="M1 7 Q6 1 12 7 Q18 1 23 7" fill="none" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/></svg>
        <svg class="bird bird--3" viewBox="0 0 24 10"><path d="M1 7 Q6 1 12 7 Q18 1 23 7" fill="none" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/></svg>
        <svg class="bird bird--4" viewBox="0 0 24 10"><path d="M1 7 Q6 1 12 7 Q18 1 23 7" fill="none" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/></svg>
        <svg class="bird bird--5" viewBox="0 0 24 10"><path d="M1 7 Q6 1 12 7 Q18 1 23 7" fill="none" stroke="#2a2a2a" stroke-width="1.2" stroke-linecap="round"/></svg>
      </div>

      <header class="topbar">
        <a href="#" class="wordmark">
          <svg class="wordmark__crown" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 8 L6 5 L9 8 L12 3 L15 8 L18 5 L21 8 L21 12 L3 12 Z" fill="#1a3a6c"/>
            <rect x="3" y="13" width="18" height="2" fill="#1a3a6c"/>
          </svg>
          <span>Columbia University</span>
        </a>
      </header>

      <section class="search" role="search">
        <div class="search__box" id="searchBox">
          <input
            id="searchInput"
            class="search__input"
            type="text"
            autocomplete="off"
            aria-label="Search Columbia University"
            placeholder=""
          />
          <button class="search__button" aria-label="Search">
            <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
              <circle cx="11" cy="11" r="7" fill="none" stroke="#4a4a4a" stroke-width="2" />
              <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="#4a4a4a" stroke-width="2" stroke-linecap="round" />
            </svg>
          </button>

          <ul class="search__suggestions" id="suggestions" role="listbox" hidden></ul>
        </div>
      </section>

      <footer class="footer">
        <nav class="footer__links">
          <span>&copy; Columbia University</span>
          <a href="#">Privacy Policy</a>
          <a href="#">Accessibility</a>
          <a href="#">Contact</a>
          <a href="#">Careers</a>
          <a href="#">Giving</a>
        </nav>
        <div class="footer__social" aria-label="Social media">
          <a href="#" aria-label="Facebook">
            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M13 22v-8h3l.5-4H13V7.5c0-1.1.3-1.8 1.9-1.8H17V2.2C16.6 2.1 15.4 2 14 2c-2.9 0-5 1.8-5 5v3H6v4h3v8z"/></svg>
          </a>
          <a href="#" aria-label="X">
            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M18 2h3l-7 8 8 12h-6l-5-7-6 7H2l8-9L2 2h6l4 6z"/></svg>
          </a>
          <a href="#" aria-label="Instagram">
            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="none" stroke="currentColor" stroke-width="2" d="M4 7a3 3 0 0 1 3-3h10a3 3 0 0 1 3 3v10a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3zM12 8.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7zM17 7v0"/></svg>
          </a>
          <a href="#" aria-label="YouTube">
            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M22 8s-.2-1.4-.8-2c-.8-.8-1.6-.8-2-.9C16.2 5 12 5 12 5s-4.2 0-7.2.1c-.4.1-1.2.1-2 .9C2.2 6.6 2 8 2 8s-.2 1.6-.2 3.2v1.5c0 1.6.2 3.2.2 3.2s.2 1.4.8 2c.8.8 1.8.8 2.3.9 1.6.1 6.9.2 6.9.2s4.2 0 7.2-.2c.4-.1 1.2-.1 2-.9.6-.6.8-2 .8-2s.2-1.6.2-3.2v-1.5C22.2 9.6 22 8 22 8zM10 15V9l5 3z"/></svg>
          </a>
        </div>
      </footer>
    </main>

    <script src="script.js"></script>
  </body>
</html>
